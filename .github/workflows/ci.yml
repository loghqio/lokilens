name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./... -v -count=1

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Start Loki and log generator
        run: docker compose -f docker/docker-compose.yml up -d loki loggen

      - name: Wait for Loki to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3100/ready > /dev/null 2>&1; then
              echo "Loki is ready"
              exit 0
            fi
            echo "Waiting for Loki... ($i/30)"
            sleep 2
          done
          echo "Loki failed to start"
          docker compose -f docker/docker-compose.yml logs loki
          exit 1

      - name: Wait for log ingestion
        run: |
          echo "Waiting 20s for loggen to populate Loki..."
          sleep 20
          # Verify logs exist
          LABELS=$(curl -sf http://localhost:3100/loki/api/v1/labels | grep -c "service" || true)
          if [ "$LABELS" -eq 0 ]; then
            echo "Warning: no 'service' label found yet, waiting 15s more..."
            sleep 15
          fi

      - name: Run integration tests
        run: go test -tags integration -v -count=1 -timeout 5m ./integration/...
        env:
          LOKI_URL: http://localhost:3100

      - name: Teardown
        if: always()
        run: docker compose -f docker/docker-compose.yml down -v

  docker:
    needs: [test, integration]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            loghqio/lokilens:${{ github.sha }}
            loghqio/lokilens:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
