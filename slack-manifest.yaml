display_information:
  name: LokiLens
  description: Natural language log analysis powered by Grafana Loki
  background_color: "#2C2D30"
  long_description: |
    LokiLens converts natural language questions into LogQL queries, executes
    them against Grafana Loki, and returns summarized results directly in Slack.
    Mention @LokiLens in any channel or DM it directly to get started.

features:
  app_home:
    home_tab_enabled: false
    messages_tab_enabled: true
    messages_tab_read_only_enabled: false
  bot_user:
    display_name: LokiLens
    always_online: true
  slash_commands:
    - command: /lokilens-setup
      description: Configure LokiLens for your workspace
      usage_hint: ""
      should_escape: false

oauth_config:
  redirect_urls:
    - https://your-domain.com/slack/oauth/callback
  scopes:
    bot:
      - app_mentions:read
      - channels:history
      - channels:read
      - chat:write
      - commands
      - groups:history
      - groups:read
      - im:history
      - im:read
      - im:write
      - mpim:history
      - mpim:read

settings:
  event_subscriptions:
    bot_events:
      - app_mention
      - message.channels
      - message.groups
      - message.im
      - message.mpim
  interactivity:
    is_enabled: true
    request_url: https://your-domain.com/slack/interactions
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
